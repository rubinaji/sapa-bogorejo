<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPA Bogorejo - Pendaftaran</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:grid;
    grid-template-columns:350px 1fr;
    box-shadow:0 15px 50px rgba(0,0,0,.2);
}

.left{
    background:#f8fafc;
    padding:30px;
}

.right{
    padding:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    background:#dcfce7;
}

.selected{
    border:3px solid #16a34a !important;
    background:#dcfce7 !important;
}

.info{
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

select,button{
    width:100%;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    font-size:18px;
}

select{
    border:1px solid #ccc;
}

button{
    border:none;
    background:#16a34a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

button:disabled{
    background:#94a3b8;
    cursor:not-allowed;
}

#status{
    display:none;
    margin-top:20px;
    background:#dcfce7;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
    <h2>Menunggu Pendaftaran</h2>
    <br>
    <div id="listPasien">Memuat data...</div>
</div>

<div class="right">

    <h2>Ruang Pendaftaran</h2>
    <br>

    <div class="info">
        <h3 id="nama">Pilih pasien</h3>
        <p id="desa">-</p>
        <p id="idPasien">ID Internal : -</p>
    </div>

    <label>Pilih Klaster Tujuan</label>

    <select id="klaster">
        <option>Klaster 3 Dewasa dan Lansia</option>
        <option>Klaster II Ibu dan Anak (KIA)</option>
        <option>Klaster II Anak dan Remaja (MTBS)</option>
        <option>Klaster IV Penyakit Menular</option>
        <option>Laboratorium</option>
        <option>Apotek</option>
        <option>Gizi</option>
        <option>Imunisasi</option>
        <option>PONED</option>
        <option>Konseling</option>
        <option>Lintas Klaster (Gawat Darurat)</option>
        <option>Lintas Klaster (Gigi dan Mulut)</option>
    </select>

    <button id="btnKirim">
        KIRIM KE KLASTER
    </button>

    <div id="status"></div>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbynj2fs_Q9zyrrQIwaaaifz7d6SetSpvo7wVDU1bcRFV4hDF3chrCFLpwI34e4g0Cc/exec";

let pasienAktif=null;

async function loadData(){

    try{

        const response=await fetch(API_URL);
        const data=await response.json();

        const list=document.getElementById("listPasien");
        list.innerHTML="";

        const pasien=data.filter(
            x=>x.status==="Menunggu Pendaftaran"
        );

        if(pasien.length===0){
            list.innerHTML="<p>Tidak ada pasien menunggu.</p>";
            return;
        }

        pasien.forEach(item=>{

            const card=document.createElement("div");

            card.className="card";

            card.innerHTML=`
                <b>${item.id} - ${item.sapaan} ${item.nama}</b><br>
                Desa ${item.desa}
            `;

            card.onclick=function(){

                document.querySelectorAll(".card")
                .forEach(c=>c.classList.remove("selected"));

                card.classList.add("selected");

                pasienAktif=item;

                document.getElementById("nama").innerText=
                    item.sapaan+" "+item.nama;

                document.getElementById("desa").innerText=
                    "Desa "+item.desa;

                document.getElementById("idPasien").innerText=
                    "ID Internal : "+item.id;

            };

            list.appendChild(card);

        });

    }
    catch(err){
        console.log(err);
    }

}

document.getElementById("btnKirim").onclick=async()=>{

    if(!pasienAktif){
        alert("Pilih pasien terlebih dahulu");
        return;
    }

    const tombol=document.getElementById("btnKirim");

    tombol.disabled=true;
    tombol.innerText="MENGIRIM...";

    const klaster=document.getElementById("klaster").value;

    try{

        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify({
                aksi:"pindah_klaster",
                id:pasienAktif.id,
                klaster:klaster
            })
        });

        document.getElementById("status").style.display="block";

        document.getElementById("status").innerHTML=
            "✅ "+pasienAktif.id+
            " berhasil dikirim ke "+
            klaster;

        pasienAktif=null;

        document.getElementById("nama").innerText=
            "Pilih pasien";

        document.getElementById("desa").innerText="-";

        document.getElementById("idPasien").innerText=
            "ID Internal : -";

        loadData();

    }
    catch(err){

        console.log(err);

        alert("Gagal mengirim ke klaster");

    }

    tombol.disabled=false;
    tombol.innerText="KIRIM KE KLASTER";

};

loadData();

setInterval(()=>{
    if(!pasienAktif){
        loadData();
    }
},5000);

</script>

</body>
</html>
